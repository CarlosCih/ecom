{% extends "base.html" %}
{% load static %}

{% block title %}Contraseña actualizada{% endblock %}

{% block body %}
<section class="flex min-h-[calc(100vh-4rem)] items-center justify-center px-4 py-12 sm:px-6 lg:px-8">
    <div class="w-full max-w-lg rounded-lg border border-gray-200 bg-white shadow-sm">
        <div class="border-b border-gray-200 px-6 py-6 sm:px-8">
            <div class="mx-auto flex h-12 w-12 items-center justify-center rounded-full bg-green-50 text-green-700">
                <svg class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M20 6L9 17l-5-5"></path>
                </svg>
            </div>

            <div class="mt-5 text-center">
                <p class="text-xs font-semibold uppercase tracking-[0.18em] text-green-700">Proceso completado</p>
                <h1 class="mt-2 text-2xl font-semibold text-gray-950">Contraseña actualizada</h1>
                <p class="mt-3 text-sm leading-6 text-gray-600">
                    Tu contraseña se cambió correctamente. Ya puedes iniciar sesión con tus nuevas credenciales.
                </p>
            </div>
        </div>

        <div class="px-6 py-6 sm:px-8">
            <a href="{% url 'login' %}" class="inline-flex w-full items-center justify-center rounded-md bg-indigo-600 px-4 py-2.5 text-sm font-semibold text-white shadow-sm transition hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
                Iniciar sesión
            </a>
        </div>
    </div>
</section>
{% endblock %}
