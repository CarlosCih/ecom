{% extends "base.html" %}
{% load static %}
{% block title %}Cambiar contraseña{% endblock %}

{% block body %}
<div class="min-h-screen bg-gray-100">
    <div class="mx-auto max-w-6xl px-4 py-8 sm:px-6 lg:px-8">
        <!-- Layout -->
        <div class="flex flex-col md:flex-row gap-6">

            {% include "users/partials/menu_settings.html" %}

            <!-- Contenido principal -->
            <main class="flex-1 space-y-4">
                <h2 class="text-xl font-semibold text-gray-900">Cambiar contraseña</h2>
                <p class="text-gray-600">Actualiza tu contraseña para mantener tu cuenta segura.</p>

                <!-- Formulario de cambio de contraseña -->
                <form method="post" action="{% url 'password_change' %}" class="space-y-6">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label for="old_password" class="block text-sm font-medium text-gray-700">Contraseña actual</label>
                        <input type="password" name="old_password" id="old_password" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
                    </div>
                    <div class="mb-4">
                        <label for="new_password1" class="block text-sm font-medium text-gray-700">Nueva contraseña</label>
                        <input type="password" name="new_password1" id="new_password1" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
                    </div>
                    <div class="mb-4">
                        <label for="new_password2" class="block text-sm font-medium text-gray-700">Confirmar nueva contraseña</label>
                        <input type="password" name="new_password2" id="new_password2" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
                    </div>
                    <div class="flex justify-end">
                        <button type="submit" class="inline-flex items-center gap-2 rounded-2xl bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-700 transition">
                        Guardar cambios
                        </button>
                    </div>
                </form>
            </main>
        </div>
    </div>
</div>
{% endblock %}
